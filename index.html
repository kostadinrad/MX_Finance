<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial & Operational Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* Custom scrollbar for large data tables */
        .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f1f1; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between border-b border-slate-200 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Spend Analytics & Simulations</h1>
                <p class="text-sm text-slate-500 mt-1">Live data synced directly from Excel</p>
            </div>
            <div id="status" class="mt-4 md:mt-0 text-xs inline-flex items-center px-3 py-1.5 rounded-full font-medium bg-amber-50 text-amber-800 border border-amber-200">
                <span class="w-2 h-2 mr-2 bg-amber-400 rounded-full animate-pulse"></span>
                Loading workbook...
            </div>
        </header>

        <nav id="tabs" class="flex flex-wrap gap-2 mb-6" aria-label="Tabs"></nav>

        <main class="bg-white rounded-xl shadow-xs border border-slate-200 overflow-hidden">
            <div class="table-container overflow-x-auto p-2">
                <table id="excel-table" class="min-w-full divide-y divide-slate-200 text-sm text-left">
                    </table>
            </div>
        </main>
    </div>

    <script>
        const FILE_PATH = './Spend as percentage.xlsx';
        let workbook = null;

        async function initDashboard() {
            const statusEl = document.getElementById('status');
            try {
                // The '?v=' + timestamp forces the browser/GitHub to bypass cache and pull the latest commit
                const cacheBuster = `${FILE_PATH}?v=${new Date().getTime()}`;
                const response = await fetch(cacheBuster);
                
                if (!response.ok) throw new Error('Excel file not found or failed to load.');
                
                const arrayBuffer = await response.arrayBuffer();
                workbook = XLSX.read(arrayBuffer, { type: 'array' });
                
                // Update status to success
                statusEl.className = "text-xs inline-flex items-center px-3 py-1.5 rounded-full font-medium bg-emerald-50 text-emerald-800 border border-emerald-200";
                statusEl.innerHTML = '<span class="w-2 h-2 mr-2 bg-emerald-500 rounded-full"></span> Live & Synced';

                renderTabs();
                // Render the first sheet by default (Simulation or whatever comes first)
                if (workbook.SheetNames.length > 0) {
                    renderSheet(workbook.SheetNames[0]);
                }

            } catch (error) {
                console.error(error);
                statusEl.className = "text-xs inline-flex items-center px-3 py-1.5 rounded-full font-medium bg-rose-50 text-rose-800 border border-rose-200";
                statusEl.innerHTML = '<span class="w-2 h-2 mr-2 bg-rose-500 rounded-full"></span> Error loading data';
            }
        }

        function renderTabs() {
            const tabsContainer = document.getElementById('tabs');
            tabsContainer.innerHTML = '';

            workbook.SheetNames.forEach((sheetName, index) => {
                const btn = document.createElement('button');
                btn.textContent = sheetName;
                btn.className = `tab-btn px-4 py-2 text-sm font-medium rounded-lg transition-colors cursor-pointer border ${
                    index === 0 
                    ? 'bg-slate-900 text-white border-slate-900' 
                    : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                }`;
                btn.onclick = () => switchSheet(sheetName, btn);
                tabsContainer.appendChild(btn);
            });
        }

        function switchSheet(sheetName, activeBtn) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.className = 'tab-btn px-4 py-2 text-sm font-medium rounded-lg transition-colors cursor-pointer border bg-white text-slate-600 border-slate-200 hover:bg-slate-50';
            });
            activeBtn.className = 'tab-btn px-4 py-2 text-sm font-medium rounded-lg transition-colors cursor-pointer border bg-slate-900 text-white border-slate-900';
            renderSheet(sheetName);
        }

        function renderSheet(sheetName) {
            const worksheet = workbook.Sheets[sheetName];
            // Convert to a clean matrix array of rows and columns, preserving empty placeholders
            const rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
            const tableEl = document.getElementById('excel-table');
            tableEl.innerHTML = '';

            if (rawData.length === 0) {
                tableEl.innerHTML = '<tbody><tr><td class="p-8 text-center text-slate-400">This tab is empty.</td></tr></tbody>';
                return;
            }

            const tbody = document.createElement('tbody');
            tbody.className = "divide-y divide-slate-100";

            rawData.forEach((row) => {
                const tr = document.createElement('tr');
                // Optional: Soft alternate row background lines
                tr.className = "hover:bg-slate-50/80 transition-colors";

                row.forEach((cellValue) => {
                    const td = document.createElement('td');
                    td.className = "px-4 py-2.5 whitespace-nowrap font-medium text-slate-700 max-w-xs truncate";
                    
                    // Format output numbers cleanly if applicable
                    if (typeof cellValue === 'number') {
                        td.textContent = Number(cellValue.toFixed(4)).toLocaleString();
                        td.classList.add('text-right', 'font-mono');
                    } else {
                        td.textContent = cellValue;
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });

            tableEl.appendChild(tbody);
        }

        // Run on page load
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
